services:
  - type: web
    name: top-world-enterprises
    runtime: static
    staticPublishPath: .
    buildCommand: ""
    pullRequestPreviewsEnabled: true
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      # 301, not rewrite. A rewrite serves the new page at the OLD url =
      # duplicate content, and transfers no link equity. These legacy GoDaddy
      # paths must genuinely move.
      - type: redirect
        source: /accueil%2Fhome
        destination: /
      - type: redirect
        source: /accueil/home
        destination: /
      - type: redirect
        source: /contactez-nous%2Fcontact-us
        destination: /contact/
      - type: redirect
        source: /contactez-nous/contact-us
        destination: /contact/
      # /mission had real content on the old site; the homepage absorbed it.
      - type: redirect
        source: /mission
        destination: /
